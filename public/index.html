<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Light Revealed Chatbot</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-sidebar: #0a0912;
        --bg-main: #0e0e16;
        --bg-input: #1a1923;
        --text-main: #ececec;
        --text-muted: #b4b4b4;
        --accent: #3b82f6;
        --border: #333333;
      }

      * { box-sizing: border-box; font-family: "Inter", sans-serif; margin: 0; padding: 0; }
      
      body { display: flex; height: 100dvh; background-color: var(--bg-main); color: var(--text-main); overflow: hidden; }

      .sidebar {
        width: 350px;
        background-color: var(--bg-sidebar);
        display: flex;
        flex-direction: column;
        border-right: 1px solid var(--border);
        padding: 15px;
        z-index: 1000;
      }

      .close-sidebar-btn {
        display: none; 
        background: none;
        border: none;
        color: var(--text-muted);
        font-size: 20px;
        cursor: pointer;
        align-self: flex-end;
        margin-bottom: 15px;
      }

      .new-chat-btn {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%);
        color: var(--text-main); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px;
        padding: 12px; font-size: 14px; font-weight: 500; cursor: pointer; text-align: left;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); margin-bottom: 15px; flex-shrink: 0;
      }
      .new-chat-btn:hover { border-color: rgba(255, 255, 255, 0.2); transform: translateY(-1px); }

      .search-container { margin-bottom: 15px; flex-shrink: 0;}
      .search-container input {
        width: 100%; background-color: var(--bg-input); color: var(--text-main);
        border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 13px; outline: none;
      }
      .history-label { font-size: 12px; color: var(--text-muted); font-weight: 600; margin-bottom: 10px; padding-left: 5px; flex-shrink: 0; }
      
      /* --- SPLIT SIDEBAR LAYOUT (History 2/3, Bookmarks 1/3) --- */
      .sidebar-scrollable { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
      .history-section { flex: 2; display: flex; flex-direction: column; overflow-y: auto; }
      .bookmarks-section { flex: 1; display: flex; flex-direction: column; border-top: 1px solid var(--border); padding-top: 15px; margin-top: 10px; overflow-y: auto; }
      
      .history-list { flex: 1; display: flex; flex-direction: column; gap: 5px; }
      
      .history-item {
        padding: 10px; font-size: 13px; color: var(--text-main); border-radius: 6px; cursor: pointer;
        width: 100%; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; /* FIXES TEXT CROPPING */
      }
      .history-item:hover { background-color: rgba(255, 255, 255, 0.1); }
      .history-item.active { background-color: var(--bg-input); border-left: 3px solid var(--accent); }

      .profile-section { flex-shrink: 0; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
      .profile-info { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 500; }
      .profile-avatar { width: 32px; height: 32px; background-color: #5436da; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
      
      .auth-btn {
        background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: var(--text-main);
        cursor: pointer; font-size: 13px; font-weight: 500; padding: 6px 12px; border-radius: 20px; transition: all 0.2s ease;
      }
      .auth-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.02); }

      /* --- MAIN CHAT AREA --- */
      .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
      .header { padding: 15px 20px; font-weight: 600; color: var(--text-muted); border-bottom: 1px solid var(--border); display: flex; justify-content: center; position: relative; }
      .chat-container { flex: 1; overflow-y: auto; padding: 40px 0; display: flex; flex-direction: column; scroll-behavior: smooth; }

      .message-row { padding: 24px 20px; display: flex; justify-content: center; border: none !important; }
      .message-row.user { background-color: transparent; }
      .message-row.bot { background-color: rgba(255, 255, 255, 0.03); } 
      
      .message-content { max-width: 800px; width: 100%; display: flex; gap: 20px; line-height: 1.6; font-size: 15px; }
      .avatar { width: 30px; height: 30px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; flex-shrink: 0; }
      .user .avatar { background-color: #5436da; }
      
      .message-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
      .text-wrapper { white-space: pre-wrap; }
      
      /* --- ACTION BUTTONS (Copy & Bookmark) --- */
      .message-actions { display: flex; gap: 8px; margin-top: 10px; opacity: 0; transition: opacity 0.2s; }
      .message-actions.user-actions { justify-content: flex-end; }
      .message-row:hover .message-actions { opacity: 1; }
      .action-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
      .action-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
      
      .message-row.bot .text-wrapper { animation: fadeIn 0.5s ease-in-out; }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

      .typing-indicator { color: var(--text-muted); font-size: 14px; font-style: italic; }
      .typing-indicator::after { content: "Thinking"; animation: typingDots 1.5s infinite; }
      @keyframes typingDots { 0% { content: "Thinking"; } 25% { content: "Thinking."; } 50% { content: "Thinking.."; } 75% { content: "Thinking..."; } 100% { content: "Thinking"; } }

      .thinking-logo img { animation: pulse-rotate 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
      @keyframes pulse-rotate { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.1) rotate(180deg); } 100% { transform: scale(1) rotate(360deg); } }

      /* --- CENTERED INPUT ANIMATION --- */
      .input-container { padding: 30px 20px; display: flex; justify-content: center; transition: transform 0.4s ease-out; transform: translateY(0); }
      .input-container.centered { transform: translateY(-40vh); /* visually centers the box when empty */ }
      .input-box { max-width: 800px; width: 100%; position: relative; display: flex; align-items: flex-end; background-color: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
      textarea.main-input { flex: 1; background: transparent; border: none; padding: 16px 50px 16px 20px; color: var(--text-main); font-size: 15px; outline: none; resize: none; min-height: 54px; max-height: 200px; overflow-y: auto; line-height: 1.5; }
      button.send-btn { position: absolute; bottom: 10px; right: 12px; background: var(--accent); color: white; border: none; border-radius: 6px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

      .menu-btn { display: none; background: none; border: none; color: var(--text-main); font-size: 24px; cursor: pointer; position: absolute; left: 20px; top: 10px; }
      .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); z-index: 999; }
      
      @media (max-width: 768px) {
        .menu-btn { display: block; }
        .sidebar { position: fixed; left: -350px; height: 100%; transition: left 0.3s ease; }
        .sidebar.open { left: 0; }
        .mobile-overlay.open { display: block; }
        .close-sidebar-btn { display: block; }
        .input-container { padding: 15px 15px 25px 15px; }
        .message-actions { opacity: 1; } /* Always show buttons on mobile */
      }

      /* Modals */
      .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 3000; backdrop-filter: blur(4px); }
      .modal-content { background: var(--bg-sidebar); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid var(--border); position: relative; }
      .modal-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: var(--text-muted); font-size: 24px; cursor: pointer; }
      .modal-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); color: white; padding: 12px 15px; border-radius: 6px; margin-bottom: 15px; font-size: 15px; outline: none; }
      .modal-btn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
      .modal-toggle { text-align: center; font-size: 13px; color: var(--text-muted); cursor: pointer; }
      #authError { color: #ef4444; font-size: 13px; text-align: center; margin-bottom: 15px; display: none; }
      
      /* Full Page Bookmarks View */
      #allBookmarksView { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-main); z-index: 2000; overflow-y: auto; padding: 40px 20px; }
      .bookmark-card { background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
      .bookmark-prompt { font-weight: 600; margin-bottom: 10px; color: var(--accent); }
      .bookmark-response { font-size: 14px; color: var(--text-main); white-space: pre-wrap; line-height: 1.5; }
    </style>
  </head>
  <body>
    
   <div class="sidebar">
      <button class="close-sidebar-btn" onclick="toggleSidebar()">✕</button>
      <button class="new-chat-btn" onclick="startNewChat()">+ New chat</button>
      
      <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search history..." onkeyup="filterHistory()" />
      </div>
      
      <div class="sidebar-scrollable">
          <div class="history-section">
              <div class="history-label">Message History</div>
              <div class="history-list" id="historyList"></div>
          </div>
          
          <div class="bookmarks-section">
              <div class="history-label">Recent Bookmarks</div>
              <div class="history-list" id="bookmarkList"></div>
              <button class="auth-btn" style="margin-top: 15px; width: 100%; text-align: center;" onclick="openAllBookmarksView()">View All Bookmarks</button>
          </div>
      </div>

      <div class="profile-section">
        <div class="profile-info" id="profileInfo">
          <div class="profile-avatar">G</div>
          <span id="usernameDisplay">Guest Mode</span>
        </div>
        <button class="auth-btn" id="authActionBtn" onclick="openAuthModal()">Sign In</button>
      </div>
    </div>

    <div class="mobile-overlay" id="mobileOverlay" onclick="toggleSidebar()"></div>

    <div id="allBookmarksView">
        <div style="max-width: 800px; margin: 0 auto;">
            <button onclick="closeAllBookmarksView()" class="auth-btn" style="margin-bottom: 20px;">← Back to Chat</button>
            <h2 style="margin-bottom: 20px;">All Saved Bookmarks</h2>
            <div id="allBookmarksContainer"></div>
        </div>
    </div>

    <div class="main-content">
      <div class="header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        Light Revealed Chatbot
      </div>
      
      <div class="chat-container" id="chat-container"></div>
      
      <div class="input-container centered" id="inputContainer">
        <div class="input-box">
          <textarea id="userInput" class="main-input" placeholder="Message Light Revealed..." rows="1"></textarea>
          <button class="send-btn" onclick="sendMessage()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="authModal">
      <div class="modal-content">
        <button class="modal-close" onclick="closeAuthModal()">&times;</button>
        <h2 id="modalTitle" style="margin-bottom: 25px; text-align: center;">Sign In</h2>
        <div id="authError"></div>
        <input type="text" id="authUsername" class="modal-input" placeholder="Username" />
        <input type="password" id="authPassword" class="modal-input" placeholder="Password" />
        <button class="modal-btn" id="authSubmitBtn" onclick="handleAuth()">Sign In</button>
        <div class="modal-toggle" id="authToggleBtn" onclick="toggleAuthMode()">Don't have an account? Sign Up</div>
      </div>
    </div>

    <script>
      const chatContainer = document.getElementById("chat-container");
      const inputContainer = document.getElementById("inputContainer");
      const inputField = document.getElementById("userInput");
      const historyList = document.getElementById("historyList");
      let lastUserPrompt = ""; // Memory block to save the prompt for bookmarking

      // UI Toggles
      function toggleSidebar() {
          document.querySelector('.sidebar').classList.toggle('open');
          document.getElementById('mobileOverlay').classList.toggle('open');
      }

      // Copy to Clipboard logic
      function copyToClipboard(text) {
          navigator.clipboard.writeText(text).then(() => {
              alert("Copied to clipboard!");
          }).catch(err => {
              console.error("Failed to copy text: ", err);
          });
      }

      inputField.addEventListener("input", function () {
        this.style.height = "auto"; 
        this.style.height = this.scrollHeight + "px"; 
      });

      inputField.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault(); 
          sendMessage();
        }
      });

      let token = localStorage.getItem("token");
      let username = localStorage.getItem("username");
      let isLoginMode = true;
      let currentSessionId = generateSessionId();

      function generateSessionId() {
        return "session_" + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
      }

      function init() {
        updateProfileUI();
        startNewChat();
        if (token) {
            fetchSidebarSessions();
            fetchBookmarks(); // Load bookmarks on start
        }
      }

      function updateProfileUI() {
        const nameDisplay = document.getElementById("usernameDisplay");
        const avatar = document.querySelector(".profile-avatar");
        const actionBtn = document.getElementById("authActionBtn");

        if (token && username) {
          nameDisplay.innerText = username;
          avatar.innerText = username.charAt(0).toUpperCase();
          actionBtn.innerText = "Sign Out";
          actionBtn.onclick = logout;
        } else {
          nameDisplay.innerText = "Guest Mode";
          avatar.innerText = "G";
          actionBtn.innerText = "Sign In";
          actionBtn.onclick = openAuthModal;
        }
      }

      function startNewChat() {
        currentSessionId = generateSessionId();
        chatContainer.innerHTML = "";
        
        // Reset the input box to the center of the screen
        inputContainer.classList.add("centered");

        document.querySelectorAll(".history-item").forEach((el) => el.classList.remove("active"));
        if (!token) renderMessage("স্বাগতম! আপনি অতিথি হিসেবে ব্যবহার করছেন।", "bot");
        
        document.querySelector('.sidebar').classList.remove('open');
        document.getElementById('mobileOverlay').classList.remove('open');
      }

      async function fetchSidebarSessions() {
        if (!token) return;
        try {
          const res = await fetch("/sessions", { headers: { Authorization: `Bearer ${token}` } });
          const data = await res.json();
          historyList.innerHTML = "";
          if (data.sessions && data.sessions.length > 0) {
            // ONLY GRAB THE LAST 20 CONVERSATIONS FOR THE UI
            const visibleHistory = data.sessions.slice(0, 20);
            
            visibleHistory.forEach((session) => {
              const div = document.createElement("div");
              div.className = "history-item";
              div.innerText = session.title;
              div.onclick = () => {
                  loadSpecificChat(session.session_id, div);
                  document.querySelector('.sidebar').classList.remove('open');
                  document.getElementById('mobileOverlay').classList.remove('open');
              };
              historyList.appendChild(div);
            });
          }
        } catch (e) { }
      }

      async function loadSpecificChat(sessionId, clickedElement) {
        currentSessionId = sessionId;
        chatContainer.innerHTML = "";
        
        // Ensure input box drops down when a chat history is loaded
        inputContainer.classList.remove("centered");

        document.querySelectorAll(".history-item").forEach((el) => el.classList.remove("active"));
        if (clickedElement) clickedElement.classList.add("active");

        try {
          const res = await fetch(`/history/${sessionId}`, { headers: { Authorization: `Bearer ${token}` } });
          const data = await res.json();
          if (data.history && data.history.length > 0) {
            data.history.forEach((msg) => renderMessage(msg.content, msg.role, null, true));
          }
        } catch (e) { }
      }

      function filterHistory() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll(".history-item").forEach((item) => {
          item.style.display = item.innerText.toLowerCase().includes(query) ? "block" : "none";
        });
      }

      // --- BOOKMARK LOGIC ---
      async function bookmarkMessage(promptText, responseText, btnElement) {
          if (!token) return alert("Please sign in to save bookmarks.");
          
          const ogHtml = btnElement.innerHTML;
          btnElement.innerHTML = "⏳ Saving...";
          
          try {
              const res = await fetch("/api/bookmarks", {
                  method: "POST",
                  headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
                  body: JSON.stringify({ prompt: promptText, response: responseText })
              });
              
              if(res.ok) {
                  btnElement.innerHTML = "✅ Saved!";
                  fetchBookmarks(); // Refresh the list
              } else {
                  btnElement.innerHTML = "❌ Failed";
              }
          } catch (e) {
              btnElement.innerHTML = "❌ Error";
          }
          
          setTimeout(() => { btnElement.innerHTML = ogHtml; }, 2000);
      }

      async function fetchBookmarks() {
          if (!token) return;
          try {
              const res = await fetch("/api/bookmarks", { headers: { Authorization: `Bearer ${token}` }});
              const data = await res.json();
              if(data.bookmarks) {
                  renderBookmarksSidebar(data.bookmarks);
                  renderAllBookmarksPage(data.bookmarks);
              }
          } catch(e) {}
      }

      function renderBookmarksSidebar(bookmarks) {
          const list = document.getElementById("bookmarkList");
          list.innerHTML = "";
          // Show only top 5-8 recent bookmarks
          bookmarks.slice(0, 7).forEach(b => {
              const div = document.createElement("div");
              div.className = "history-item";
              div.innerText = b.prompt;
              div.onclick = openAllBookmarksView; // Clicking sends them to full view
              list.appendChild(div);
          });
      }

      function renderAllBookmarksPage(bookmarks) {
          const container = document.getElementById("allBookmarksContainer");
          container.innerHTML = "";
          bookmarks.forEach(b => {
              container.innerHTML += `
                  <div class="bookmark-card">
                      <div class="bookmark-prompt">Q: ${b.prompt}</div>
                      <div class="bookmark-response">${b.response}</div>
                  </div>
              `;
          });
      }

      function openAllBookmarksView() { document.getElementById("allBookmarksView").style.display = "block"; }
      function closeAllBookmarksView() { document.getElementById("allBookmarksView").style.display = "none"; }


      function openAuthModal() { document.getElementById("authModal").style.display = "flex"; }
      function closeAuthModal() { document.getElementById("authModal").style.display = "none"; document.getElementById("authError").style.display = "none"; }
      
      function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById("modalTitle").innerText = isLoginMode ? "Sign In" : "Create Account";
        document.getElementById("authSubmitBtn").innerText = isLoginMode ? "Sign In" : "Sign Up";
        document.getElementById("authToggleBtn").innerText = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Sign In";
        document.getElementById("authError").style.display = "none";
      }

      async function handleAuth() {
        const u = document.getElementById("authUsername").value.trim();
        const p = document.getElementById("authPassword").value.trim();
        const errorDiv = document.getElementById("authError");
        if (!u || !p) { errorDiv.innerText = "Please enter both fields."; errorDiv.style.display = "block"; return; }

        try {
          const res = await fetch(isLoginMode ? "/login" : "/signup", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, password: p }),
          });
          const data = await res.json();
          if (res.ok) {
            token = data.token; username = data.username;
            localStorage.setItem("token", token); localStorage.setItem("username", username);
            closeAuthModal(); updateProfileUI(); fetchSidebarSessions(); fetchBookmarks(); startNewChat();
          } else {
            errorDiv.innerText = data.error; errorDiv.style.display = "block";
          }
        } catch (e) {
          errorDiv.innerText = "Connection error."; errorDiv.style.display = "block";
        }
      }

      function logout() {
        token = null; username = null;
        localStorage.removeItem("token"); localStorage.removeItem("username");
        updateProfileUI(); historyList.innerHTML = ""; document.getElementById("bookmarkList").innerHTML = ""; startNewChat();
      }

      async function sendMessage() {
        const text = inputField.value.trim();
        if (!text) return;

        // Animate the input box to the bottom
        inputContainer.classList.remove("centered");
        lastUserPrompt = text; // Save it for potential bookmarking

        renderMessage(text, "user");
        inputField.value = "";
        inputField.style.height = "auto"; 

        const typingId = "typing-" + Date.now();
        renderMessage("Thinking...", "bot", typingId);

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json", Authorization: token ? `Bearer ${token}` : "" },
            body: JSON.stringify({ message: text, sessionId: currentSessionId }),
          });
          const data = await res.json();

          document.getElementById(typingId).remove();
          animateBotReply(data.reply);

        } catch (error) {
          document.getElementById(typingId).remove();
          renderMessage("সংযোগ ত্রুটি। সার্ভার কি চালু আছে?", "bot");
        }
      }

      // --- RENDERING WITH COPY/BOOKMARK BUTTONS ---
      function renderMessage(text, sender, id = null, instant = false) {
        const row = document.createElement("div");
        row.className = `message-row ${sender}`;
        if (id) row.id = id;

        const isTyping = text === "Thinking..." ? "typing-indicator" : "";
        const isThinkingLogo = text === "Thinking..." ? "thinking-logo" : "";
        const displayText = isTyping ? "" : text; 

        let avatarContent = "";
        let actionHTML = "";

        // Build the action buttons based on sender
        const safeText = text.replace(/"/g, '&quot;').replace(/'/g, '&#39;');

        if (sender === "user") {
            const initial = username ? username.charAt(0).toUpperCase() : "G";
            avatarContent = `<div class="avatar">${initial}</div>`;
            actionHTML = `<div class="message-actions user-actions"><button class="action-btn" onclick="copyToClipboard(this.dataset.text)" data-text="${safeText}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy Prompt</button></div>`;
        } else {
            avatarContent = `<div class="avatar bot-avatar ${isThinkingLogo}"><img src="logo.png" style="width: 100%; border-radius: 4px; display: block;"></div>`;
            // Only add actions instantly if this is a historical message being loaded (not the typing indicator)
            if (instant && !isTyping) {
                 actionHTML = `
                 <div class="message-actions">
                    <button class="action-btn" onclick="copyToClipboard(this.dataset.text)" data-text="${safeText}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy Response</button>
                    </div>`;
            }
        }

        row.innerHTML = `
        <div class="message-content">
            ${avatarContent}
            <div class="message-body">
                <div class="text-wrapper ${isTyping}">${displayText}</div>
                ${actionHTML}
            </div>
        </div>`;
        
        chatContainer.appendChild(row);
        chatContainer.scrollTop = chatContainer.scrollHeight;
        return row;
      }

      function animateBotReply(fullText) {
        const row = document.createElement("div");
        row.className = "message-row bot";
        row.innerHTML = `
        <div class="message-content">
            <div class="avatar bot-avatar"><img src="logo.png" style="width: 100%; border-radius: 4px; display: block;"></div>
            <div class="message-body">
                <div class="text-wrapper"></div>
            </div>
        </div>`;
        chatContainer.appendChild(row);

        const textWrapper = row.querySelector('.text-wrapper');
        const messageBody = row.querySelector('.message-body');
        const words = fullText.split(" ");
        let currentIndex = 0;

        const interval = setInterval(() => {
          if (currentIndex < words.length) {
            textWrapper.innerText += (currentIndex === 0 ? "" : " ") + words[currentIndex];
            chatContainer.scrollTop = chatContainer.scrollHeight;
            currentIndex++;
          } else {
            clearInterval(interval);
            
            // Append action buttons after animation is fully done!
            const safeText = fullText.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            const safePrompt = lastUserPrompt.replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            
            const actionsHTML = `
            <div class="message-actions" style="opacity: 1;">
                <button class="action-btn" onclick="copyToClipboard(this.dataset.text)" data-text="${safeText}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> Copy Response</button>
                <button class="action-btn" onclick="bookmarkMessage(this.dataset.prompt, this.dataset.text, this)" data-prompt="${safePrompt}" data-text="${safeText}">🔖 Bookmark</button>
            </div>`;
            
            messageBody.insertAdjacentHTML('beforeend', actionsHTML);
            
            if (token) fetchSidebarSessions();
          }
        }, 30);
      }

      init();
    </script>
  </body>
</html>
