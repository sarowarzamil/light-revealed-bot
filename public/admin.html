<script>
  // Auth Lock
  const password = prompt("Enter Admin Password:");
  if (password !== "shawon300") {
      alert("Access Denied!");
      window.location.href = "/";
  }

  // State Variables for Pagination & Search
  let allUsers = [];
  let currentPage = 1;
  const usersPerPage = 20;

  // --- Core API Functions ---
  async function loadSettings() {
    const res = await fetch("/api/settings");
    const data = await res.json();
    document.getElementById("sysInstructionInput").value = data.systemInstruction || "";
  }

  async function saveSettingsToCloud() {
    const instruction = document.getElementById("sysInstructionInput").value;
    const statusEl = document.getElementById("status");
    try {
      await fetch("/api/settings", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ systemInstruction: instruction }),
      });
      statusEl.style.display = "block"; statusEl.style.backgroundColor = "rgba(16, 163, 127, 0.1)"; statusEl.style.color = "#10A37F";
      statusEl.innerText = "Settings successfully saved!";
    } catch (e) {
      statusEl.style.display = "block"; statusEl.style.backgroundColor = "rgba(239, 68, 68, 0.1)"; statusEl.style.color = "#ef4444";
      statusEl.innerText = "Failed to save settings.";
    }
  }

  async function syncBrain() {
    const statusEl = document.getElementById("status");
    statusEl.style.display = "block"; statusEl.style.backgroundColor = "rgba(59, 130, 246, 0.1)"; statusEl.style.color = "var(--accent-blue)";
    statusEl.innerText = "Syncing... Re-compiling document syllabus.";
    try {
      const res = await fetch("/api/sync", { method: "POST" });
      if (res.ok) {
        statusEl.style.backgroundColor = "rgba(16, 163, 127, 0.1)"; statusEl.style.color = "#10A37F";
        statusEl.innerText = "Sync successful! AI engine fully operational.";
      } else throw new Error();
    } catch (e) {
      statusEl.style.backgroundColor = "rgba(239, 68, 68, 0.1)"; statusEl.style.color = "#ef4444";
      statusEl.innerText = "Sync failure.";
    }
  }

  // --- User Management Logic ---
  async function loadUsers() {
    try {
      const res = await fetch("/api/users");
      allUsers = await res.json();
      renderUserTable();
    } catch(e) { console.error("Failed to load users"); }
  }

  function renderUserTable() {
    const searchQuery = document.getElementById("userSearchInput").value.toLowerCase();
    
    // 1. Filter users based on search
    const filteredUsers = allUsers.filter(u => u.username.toLowerCase().includes(searchQuery));
    
    // 2. Paginate the filtered list
    const startIndex = (currentPage - 1) * usersPerPage;
    const paginatedUsers = filteredUsers.slice(startIndex, startIndex + usersPerPage);
    
    // 3. Render HTML
    const tbody = document.getElementById("userTableBody");
    tbody.innerHTML = paginatedUsers.map(u => `
      <tr>
        <td>${u.username}</td>
        <td>${u.daily_chat_count}</td>
        <td><input type="number" id="limit-${u.id}" class="limit-input" value="${u.custom_limit}"></td>
        <td><button class="btn-small" onclick="updateLimit(${u.id})">Update</button></td>
      </tr>
    `).join('');

    // 4. Update Pagination Buttons
    const totalPages = Math.ceil(filteredUsers.length / usersPerPage) || 1;
    document.getElementById("pageInfo").innerText = `Page ${currentPage} of ${totalPages}`;
    document.getElementById("prevBtn").disabled = currentPage === 1;
    document.getElementById("nextBtn").disabled = currentPage === totalPages;
  }

  function changePage(direction) {
    currentPage += direction;
    renderUserTable();
  }

  function handleSearch() {
    currentPage = 1; // Reset to page 1 when searching
    renderUserTable();
  }

  async function updateLimit(userId) {
    const newLimit = document.getElementById(`limit-${userId}`).value;
    try {
      await fetch("/api/update-limit", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ userId, newLimit }),
      });
      // Update local array so UI doesn't need a full fetch
      const userIndex = allUsers.findIndex(u => u.id === userId);
      if(userIndex > -1) allUsers[userIndex].custom_limit = newLimit;
      alert("User limit updated successfully!");
    } catch (e) { alert("Failed to update limit."); }
  }

  // Initialize
  loadSettings();
  loadUsers();
</script>
